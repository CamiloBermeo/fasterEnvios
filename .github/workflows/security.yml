name: action de seguridad para faster-envios

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: 30 2 * * 1-3

jobs:

  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 #esto descarga todos los commits

      - name: configurar java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: 'backEnd/pom.xml'
      - name: Escanear dependencias con Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'           # 'fs' indica que escanee el sistema de archivos (File System)
          scan-ref: 'backEnd'       # Fuerza a Trivy a revisar solo la subcarpeta del Backend
          format: 'table'           # Imprime los resultados en una tabla limpia en la consola de GitHub
          exit-code: '1'            # CRÍTICO: Configura el pipeline para que falle (se ponga en rojo) si halla vulnerabilidades
          severity: 'HIGH,CRITICAL' # Evita falsos positivos; solo se detendrá por amenazas altas o críticas

      - name: escaneo de GitGuardian
        if: always()
        uses: GitGuardian/ggshield-action@v1.51.0
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
            # Tu token secreto guardado de forma segura en GitHub
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
