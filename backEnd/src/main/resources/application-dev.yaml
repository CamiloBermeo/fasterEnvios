spring:
  application:
    name: fasterEnvios
  output:
    ansi:
      enabled: ALWAYS

  datasource:
    url: jdbc:mysql://localhost:3306/faster_envios_db?serverTimezone=America/Bogota
    username: root
    password: Chitiva_09
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        highlight_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

client:
  openRouteService-apiKey: ${ORS_API_KEY}

api:
  security:
    token:
      secret: ${JWT_SECRET:1234567890}
      expiration: 86400

logging:
  level:
    root: INFO
    com.fasterEnvios: DEBUG

    org.hibernate.SQL: DEBUG
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.springframework.jdbc.core.StatementCreatorUtils: TRACE
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

    org.springframework.security: DEBUG
    org.springframework: WARN
    org.hibernate: WARN

  pattern:
    console: "%clr(%d{HH:mm:ss}){faint} %clr(%-5level) %clr(%logger{36}){cyan} %clr(:){faint} %msg%n"

app:
  cors:
    allowed-origins: http://localhost:5173