server {
    listen 80;
    server_name localhost;

    location /{
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Esto es lo más importante: si no encuentra el archivo físico,
        # redirige la petición al index.html para que React Router tome el control
        try_files $uri $uri/ /index.html;
    }
    # Opcional: Configuración de manejo de errores estándar
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
}